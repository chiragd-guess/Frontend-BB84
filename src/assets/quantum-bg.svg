<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1920 1080"
     width="1920"
     height="1080">

<defs>

<pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
<path d="M80 0H0V80"
      fill="none"
      stroke="#ED7D27"
      stroke-opacity=".18"
      stroke-width="1"/>
</pattern>

<pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
<circle cx="16"
        cy="16"
        r="2"
        fill="#ED7D27"
        fill-opacity=".75"/>
</pattern>

<filter id="glow">
<feGaussianBlur stdDeviation="10"/>
</filter>

<radialGradient id="orangeGlow">
<stop offset="0%" stop-color="#ED7D27" stop-opacity=".30"/>
<stop offset="100%" stop-color="#ED7D27" stop-opacity="0"/>
</radialGradient>

</defs>

<!-- GRID -->
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- DOTS -->
<rect width="100%" height="100%" fill="url(#dots)"/>

<!-- LARGE GLOW -->
<circle cx="400" cy="280" r="260" fill="url(#orangeGlow)"/>
<circle cx="1500" cy="760" r="240" fill="url(#orangeGlow)"/>

<!-- LEFT QUANTUM ORBITS -->
<g stroke="#ED7D27"
   stroke-width="2"
   stroke-opacity=".45"
   fill="none">

<circle cx="420" cy="280" r="80"/>
<circle cx="420" cy="280" r="140"/>
<circle cx="420" cy="280" r="200"/>

<ellipse cx="420" cy="280"
         rx="220"
         ry="90"
         transform="rotate(30 420 280)"/>

<ellipse cx="420" cy="280"
         rx="220"
         ry="90"
         transform="rotate(-30 420 280)"/>

</g>

<!-- RIGHT QUANTUM ORBITS -->
<g stroke="#ED7D27"
   stroke-width="2"
   stroke-opacity=".35"
   fill="none">

<circle cx="1500" cy="760" r="70"/>
<circle cx="1500" cy="760" r="130"/>
<circle cx="1500" cy="760" r="190"/>

</g>

<!-- CIRCUIT LINES -->
<g stroke="#ED7D27"
   stroke-width="2"
   stroke-opacity=".40">

<line x1="650" y1="180" x2="980" y2="180"/>
<line x1="980" y1="180" x2="980" y2="350"/>
<line x1="980" y1="350" x2="1250" y2="350"/>

<line x1="700" y1="720" x2="1080" y2="720"/>
<line x1="1080" y1="720" x2="1080" y2="900"/>
<line x1="1080" y1="900" x2="1420" y2="900"/>

</g>

<!-- NODES -->
<g fill="#ED7D27">

<circle cx="650" cy="180" r="6"/>
<circle cx="980" cy="180" r="6"/>
<circle cx="980" cy="350" r="6"/>
<circle cx="1250" cy="350" r="6"/>

<circle cx="700" cy="720" r="6"/>
<circle cx="1080" cy="720" r="6"/>
<circle cx="1080" cy="900" r="6"/>
<circle cx="1420" cy="900" r="6"/>

</g>

<!-- GLOWING NODES -->
<g fill="#ED7D27" filter="url(#glow)">

<circle cx="980" cy="180" r="8"/>
<circle cx="1080" cy="720" r="8"/>
<circle cx="420" cy="280" r="8"/>
<circle cx="1500" cy="760" r="8"/>

</g>

<!-- BB84 STATES -->
<g
font-family="JetBrains Mono"
font-size="28"
fill="#ED7D27"
fill-opacity=".28">

<text x="760" y="120">|0⟩</text>
<text x="1180" y="230">|1⟩</text>
<text x="1330" y="620">|+⟩</text>
<text x="620" y="880">|−⟩</text>

</g>

<!-- PHOTONS -->
<g fill="#ED7D27">

<circle cx="840" cy="180" r="4"/>
<circle cx="900" cy="180" r="4"/>
<circle cx="940" cy="180" r="4"/>

<circle cx="900" cy="720" r="4"/>
<circle cx="980" cy="720" r="4"/>
<circle cx="1040" cy="720" r="4"/>

</g>

<!-- HUGE WATERMARK -->
<text
x="280"
y="600"
font-size="260"
font-family="Space Grotesk"
font-weight="700"
fill="#ED7D27"
fill-opacity=".05">

BB84

</text>

</svg>